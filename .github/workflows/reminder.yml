name: PAT Update Reminder

on:
  schedule:
    - cron: '0 0 14 4 *'  # 毎年 4/14 00:00 UTC = 09:00 JST
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack reminder
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          message='⚠️ github-daily-digest 用の GitHub PAT が約2週間後に期限切れになります。

          更新手順:
          1. https://github.com/settings/tokens で対象 classic PAT を更新（または新規発行）
             - Scopes: repo + read:org
             - 在籍 org の private repo を集計対象に含めるため classic PAT を使用
          2. https://github.com/azimicat/github-daily-digest/settings/secrets/actions で DIGEST_GITHUB_TOKEN を新しい値に上書き
          3. 翌平日 23:00 JST の自動実行が成功するか確認'
          payload=$(jq -n --arg text "$message" '{text: $text}')
          curl -sS -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL"
