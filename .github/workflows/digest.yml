name: GitHub Daily Digest

on:
  schedule:
    # 0:00 JST = 前日 15:00 UTC。曜日も UTC 基準で1日前倒しになる点に注意。
    # Mon-Fri (UTC) 15:00 = Tue-Sat (JST) 0:00 → 平日 (Mon-Fri JST) 分の活動を翌0時に集計。
    - cron: '0 15 * * 1-5'  # 15:00 UTC = 翌日 0:00 JST
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.DIGEST_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_USERNAME: sawakokawaineko
          DRY_RUN: 'false'
          SKIP_IF_EMPTY: 'false'
          TZ: Asia/Tokyo
        run: ./bin/digest.sh
