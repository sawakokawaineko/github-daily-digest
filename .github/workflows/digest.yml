name: GitHub Daily Digest

on:
  schedule:
    - cron: '13 13 * * 1-5'  # 13:13 UTC = 22:13 JST, Mon-Fri
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.DIGEST_GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_USERNAME: azimicat
          GITHUB_ORG: ${{ secrets.DIGEST_GITHUB_ORG }}
          DRY_RUN: 'false'
          SKIP_IF_EMPTY: 'false'
          TZ: Asia/Tokyo
        run: ./bin/digest.sh
